name: Build RoadLog APK

# Builds the Android app in the cloud and gives you an APK to download.
# It makes its own copy of index.html and adds the background-GPS bridge to
# that copy only — your real index.html is never changed.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Make a copy of the app and add the native bridge
        run: |
          mkdir -p www
          cp index.html www/index.html
          python3 - <<'PY'
          bridge = open("native-bridge.js", encoding="utf-8").read()
          p = "www/index.html"
          s = open(p, encoding="utf-8").read()
          marker = '<meta charset="UTF-8">'
          if marker not in s:
              raise SystemExit("Could not find the charset tag to add the bridge.")
          s = s.replace(marker, marker + "\n<script>\n" + bridge + "\n</script>", 1)
          open(p, "w", encoding="utf-8").write(s)
          print("Native bridge added to the build copy.")
          PY

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets and plugins
        run: npx cap sync android

      - name: Add background-location permissions
        run: |
          python3 - <<'PY'
          p = "android/app/src/main/AndroidManifest.xml"
          s = open(p, encoding="utf-8").read()
          perms = [
              "android.permission.ACCESS_FINE_LOCATION",
              "android.permission.ACCESS_COARSE_LOCATION",
              "android.permission.ACCESS_BACKGROUND_LOCATION",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.FOREGROUND_SERVICE_LOCATION",
          ]
          add = ""
          for perm in perms:
              if perm not in s:
                  add += '    <uses-permission android:name="%s"/>\n' % perm
          if add:
              s = s.replace("<application", add + "    <application", 1)
              open(p, "w", encoding="utf-8").write(s)
              print("Permissions added.")
          else:
              print("Permissions already present.")
          PY

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: RoadLog-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
